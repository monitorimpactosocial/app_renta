<style>
    /* 
 * PARACEL - APP RENTA V2 + PREMIUM UI
 */
    :root {
        --bg: #f6f8fb;
        --card: rgba(255, 255, 255, 0.92);
        --line: #e5e7eb;
        --text: #111827;
        --muted: #6b7280;
        --primary: #0c5b45;
        --primary-2: #0fa37f;
        --accent: #dff7ef;
        --danger: #b42318;
        --shadow: 0 12px 30px rgba(2, 24, 43, 0.08);
        --radius: 22px;
        --radius-sm: 14px;
    }

    * {
        box-sizing: border-box;
    }

    html,
    body {
        margin: 0;
        padding: 0;
        background:
            radial-gradient(circle at top left, rgba(15, 163, 127, .10), transparent 28%),
            radial-gradient(circle at bottom right, rgba(12, 91, 69, .10), transparent 25%),
            var(--bg);
        color: var(--text);
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        min-height: 100vh;
    }

    /* TOPBAR GLASSMORPHISM */
    .topbar {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 16px 24px;
        background: rgba(255, 255, 255, .75);
        backdrop-filter: blur(16px);
        border-bottom: 1px solid rgba(229, 231, 235, .8);
    }

    .brand-wrap {
        display: flex;
        align-items: center;
        gap: 14px;
    }

    .brand-logo-box {
        width: 48px;
        height: 48px;
        border-radius: 16px;
        background: linear-gradient(180deg, #ffffff 0%, #eef8f4 100%);
        border: 1px solid rgba(12, 91, 69, .12);
        box-shadow: var(--shadow);
        display: grid;
        place-items: center;
    }

    .logo {
        font-weight: 800;
        color: var(--primary);
        font-size: 1.2rem;
    }

    .titleblock .title {
        font-weight: 800;
        letter-spacing: .04em;
    }

    .titleblock .subtitle {
        color: var(--muted);
        font-size: 13px;
    }

    .titleblock .subtitle-strong {
        font-weight: 600;
        color: var(--primary-2);
    }

    .status-wrap {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .status-pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 14px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
    }

    .status-pill.success {
        background: #ecfdf3;
        color: #027a48;
        border: 1px solid #abefc6;
    }

    .status-pill.soft {
        background: rgba(12, 91, 69, .1);
        color: var(--primary);
    }

    .logout-link {
        background: transparent;
        border: 0;
        color: var(--primary);
        font-weight: 700;
        cursor: pointer;
    }

    /* SHELL & CARDS */
    .app-shell {
        width: min(1200px, calc(100% - 32px));
        margin: 24px auto 40px;
    }

    .card,
    .section-panel,
    .login-card {
        background: var(--card);
        border: 1px solid rgba(255, 255, 255, .7);
        box-shadow: var(--shadow);
        border-radius: var(--radius);
    }

    .login-card {
        max-width: 460px;
        margin: 48px auto;
    }

    .login-card-inner,
    .content {
        padding: 28px;
    }

    h1,
    h2,
    h3 {
        color: var(--text);
        margin: 0 0 16px 0;
        font-weight: 700;
    }

    .muted {
        color: var(--muted);
    }

    /* FORMS */
    label {
        display: block;
        font-size: 13px;
        font-weight: 700;
        margin: 14px 0 8px;
    }

    input,
    select,
    textarea,
    button {
        font: inherit;
    }

    input,
    select,
    textarea {
        width: 100%;
        padding: 13px 14px;
        border: 1px solid var(--line);
        border-radius: 14px;
        outline: none;
        background: rgba(255, 255, 255, .9);
        transition: .18s ease;
    }

    input:focus,
    select:focus,
    textarea:focus {
        border-color: rgba(15, 163, 127, .65);
        box-shadow: 0 0 0 4px rgba(15, 163, 127, .12);
        background: #fff;
    }

    input:read-only {
        background: #f3f4f6;
        color: var(--muted);
        cursor: not-allowed;
    }

    /* LAYOUT GRIDS */
    .grid-2 {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 16px 18px;
    }

    .grid-3 {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 16px 18px;
    }

    .align-bottom {
        align-items: end;
    }

    /* BUTTONS */
    .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 12px 18px;
        border-radius: 14px;
        border: 0;
        cursor: pointer;
        font-weight: 800;
        transition: transform .12s ease, box-shadow .18s ease, opacity .18s ease;
    }

    .btn:hover:not(:disabled) {
        transform: translateY(-1px);
    }

    .btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
    }

    .btn.primary {
        background: linear-gradient(135deg, var(--primary) 0%, var(--primary-2) 100%);
        color: white;
        box-shadow: 0 12px 24px rgba(12, 91, 69, .18);
    }

    .btn.ghost {
        background: #fff;
        color: var(--text);
        border: 1px solid var(--line);
    }

    .btn.secondary {
        background: var(--line);
        color: var(--text);
    }

    .btn-small {
        padding: 6px 12px;
        font-size: 0.85rem;
        border-radius: 8px;
    }

    .btn-large {
        width: 100%;
        padding: 16px;
        font-size: 1.1rem;
    }

    /* TABS / MENU */
    .page-tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 24px;
        border-bottom: 2px solid var(--line);
        overflow-x: auto;
    }

    .tab {
        background: none;
        border: none;
        padding: 14px 24px;
        font-size: 1rem;
        font-weight: 700;
        color: var(--muted);
        cursor: pointer;
        border-bottom: 3px solid transparent;
        margin-bottom: -2px;
        white-space: nowrap;
        transition: color 0.2s;
    }

    .tab:hover {
        color: var(--primary);
    }

    .tab.active {
        color: var(--primary);
        border-bottom-color: var(--primary);
    }

    /* DASHBOARD GRID MODULES */
    .dashboard-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 18px;
    }

    .btn-module {
        background: rgba(255, 255, 255, 0.8);
        border: 1px solid var(--line);
        border-radius: var(--radius-sm);
        padding: 32px 16px;
        text-align: center;
        cursor: pointer;
        transition: all 0.2s ease;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
    }

    .btn-module:hover {
        transform: translateY(-4px);
        box-shadow: var(--shadow);
        border-color: rgba(15, 163, 127, .4);
        background: #fff;
    }

    .btn-module .icon {
        font-size: 2.8rem;
    }

    .btn-module .text {
        font-weight: 800;
        font-size: 1.15rem;
        color: var(--text);
    }

    /* ALERT BOXES */
    .msg-success {
        background: #ecfdf3;
        color: #027a48;
        padding: 14px;
        border-radius: var(--radius-sm);
        border-left: 4px solid #32d583;
        font-weight: 600;
    }

    .msg-error {
        background: #fef3f2;
        color: #b42318;
        padding: 14px;
        border-radius: var(--radius-sm);
        border-left: 4px solid #f04438;
        font-weight: 600;
    }

    .section-banner-green {
        background: linear-gradient(to right, rgba(12, 91, 69, 0.05), transparent);
        border-left: 4px solid var(--primary);
        padding: 16px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        margin-bottom: 24px;
    }

    /* UTILS */
    .mt-8 {
        margin-top: 8px;
    }

    .mt-16 {
        margin-top: 16px;
    }

    .mb-16 {
        margin-bottom: 16px;
    }

    .mb-18 {
        margin-bottom: 18px;
    }

    .mr-16 {
        margin-right: 16px;
    }
</style>
