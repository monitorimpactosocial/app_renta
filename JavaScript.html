<script>
    // --- APP RENTA V2 CONFIGURACIÓN ---
    const app = {
        usuarioActual: null,
        deferredPrompt: null,
        catalogos: null,
        chartInstances: {},

        els: {
            // General
            cardLogin: document.getElementById('cardLogin'),
            cardApp: document.getElementById('cardApp'),
            loginUser: document.getElementById('loginUser'),
            loginPass: document.getElementById('loginPass'),
            btnLogin: document.getElementById('btnLogin'),
            btnLogout: document.getElementById('btnLogout'),
            btnInstall: document.getElementById('btnInstall'),
            loginMsg: document.getElementById('loginMsg'),
            statusPill: document.getElementById('statusPill'),

            // Tabs V2
            tabs: document.querySelectorAll('.page-tabs .tab'),
            viewFormularios: document.getElementById('viewFormularios'),
            viewDashboard: document.getElementById('viewDashboard'),

            // Formularios Internos
            panelDashboard: document.getElementById('panelDashboard'),
            panelFormulario: document.getElementById('panelFormulario'),
            moduloActivo: document.getElementById('moduloActivo'),
            registroForm: document.getElementById('registroForm'),
            formTitle: document.getElementById('formTitle'),
            camposEspec: document.getElementById('camposEspecificos'),
            btnGuardar: document.getElementById('btnGuardar'),
            formMsg: document.getElementById('formMsgContainer'),
            lblSub: document.getElementById('lblIntervencionSub'),
            lblResp: document.getElementById('lblResponsable'),

            // Form inputs V2
            doc: document.getElementById('ci'),
            nom: document.getElementById('nombres'),
            Ape: document.getElementById('apellidos'),
            dep: document.getElementById('departamento'),
            dis: document.getElementById('distrito'),
            com: document.getElementById('comunidad'),
            btnBuscarCI: document.getElementById('btnBuscarCI'),
            statusCI: document.getElementById('statusCI')
        },

        init: function () {
            this.els.btnLogin.addEventListener('click', () => this.login());
            this.els.btnLogout.addEventListener('click', () => this.logout());

            const session = localStorage.getItem('appRentaSessionV2');
            if (session) {
                this.usuarioActual = JSON.parse(session);
                this.els.lblResp.innerText = this.usuarioActual.nombre;
                this.mostrarApp();
            }

            // PWA Install Prompt Support
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                this.deferredPrompt = e;
                if (this.els.btnInstall) this.els.btnInstall.style.display = 'inline-block';
            });

            if (this.els.btnInstall) {
                this.els.btnInstall.addEventListener('click', async () => {
                    if (this.deferredPrompt) {
                        this.deferredPrompt.prompt();
                        const { outcome } = await this.deferredPrompt.userChoice;
                        if (outcome === 'accepted') this.els.btnInstall.style.display = 'none';
                        this.deferredPrompt = null;
                    }
                });
            }

            // PWA / Service Worker setup
            document.getElementById('fecha').value = new Date().toISOString().split('T')[0];
            this.registrarServiceWorker();

            // Cargar catalogos dinámicos (Idea del usuario)
            if (typeof google !== 'undefined' && google.script) {
                google.script.run
                    .withSuccessHandler(cat => {
                        this.catalogos = cat;
                        this.poblarDatalists();
                    })
                    .obtenerCatalogos();
            }
        },

        poblarDatalists: function () {
            if (!this.catalogos) return;
            const dptList = document.getElementById('list_dptos');
            if (dptList) dptList.innerHTML = this.catalogos.departamentos.map(d => `<option value="${d}">`).join('');
        },

        registrarServiceWorker: function () {
            if ('serviceWorker' in navigator) {
                const swCode = `
                    self.addEventListener('install', (e) => self.skipWaiting());
                    self.addEventListener('activate', (e) => self.clients.claim());
                    self.addEventListener('fetch', (e) => {});
                `;
                const blob = new Blob([swCode], { type: 'application/javascript' });
                navigator.serviceWorker.register(URL.createObjectURL(blob))
                    .catch(err => console.log('SW Error: ', err));
            }
        },

        // --- SISTEMA LOGIN V2 ---
        login: function () {
            const user = this.els.loginUser.value.trim();
            const pass = this.els.loginPass.value.trim();
            if (!user || !pass) return this.mostrarErrorLogin("Ingrese usuario y contraseña");

            this.els.btnLogin.disabled = true;
            this.els.btnLogin.textContent = "Verificando Seguridad...";

            if (typeof google !== 'undefined' && google.script) {
                google.script.run
                    .withSuccessHandler(res => {
                        if (res.success) this.iniciarSesionExitosa(res.user);
                        else this.mostrarErrorLogin("Credenciales incorrectas");
                    })
                    .withFailureHandler(err => this.mostrarErrorLogin("Fallo de red al servidor de identidad"))
                    .verificarLogin(user, pass);
            } else {
                // Fallback (Local Test)
                setTimeout(() => {
                    if (user.toLowerCase() === 'laura' && pass === 'renta2026') this.iniciarSesionExitosa({ nombre: 'Laura', rol: 'admin' });
                    else this.mostrarErrorLogin("Credenciales incorrectas");
                }, 1000);
            }
        },

        iniciarSesionExitosa: function (userObj) {
            this.usuarioActual = userObj;
            localStorage.setItem('appRentaSessionV2', JSON.stringify(userObj));
            this.els.lblResp.innerText = this.usuarioActual.nombre;
            this.mostrarApp();
        },

        logout: function () {
            localStorage.removeItem('appRentaSessionV2');
            this.usuarioActual = null;
            this.els.cardApp.style.display = 'none';
            this.els.cardLogin.style.display = 'block';
            this.els.btnLogout.style.display = 'none';
            this.volverAlDashboard();
        },

        mostrarApp: function () {
            this.els.cardLogin.style.display = 'none';
            this.els.cardApp.style.display = 'block';
            this.els.btnLogout.style.display = 'inline-block';
            this.volverAlDashboard();
        },

        mostrarErrorLogin: function (msg) {
            this.els.loginMsg.innerHTML = `<div class="msg-error">${msg}</div>`;
            this.els.btnLogin.disabled = false;
            this.els.btnLogin.textContent = "Ingresar Seguro";
        },

        // --- NAVEGACIÓN Y TABS V2 ---
        switchTab: function (tabName) {
            this.els.tabs.forEach(t => t.classList.remove('active'));
            this.els.viewFormularios.style.display = 'none';
            this.els.viewDashboard.style.display = 'none';

            if (tabName === 'formularios') {
                document.getElementById('tabFormularios').classList.add('active');
                this.els.viewFormularios.style.display = 'block';
            } else if (tabName === 'dashboard') {
                document.getElementById('tabDashboard').classList.add('active');
                this.els.viewDashboard.style.display = 'block';
                this.cargarDashboard();
            }
        },

        volverAlDashboard: function () {
            this.els.panelFormulario.style.display = 'none';
            this.els.panelDashboard.style.display = 'grid';
            this.els.registroForm.reset();
            document.getElementById('fecha').value = new Date().toISOString().split('T')[0];
            document.getElementById('comentario').value = '';
            this.els.formMsg.innerHTML = "";
            this.els.statusCI.innerHTML = "";
        },

        abrirFormulario: function (modulo) {
            this.els.panelDashboard.style.display = 'none';
            this.els.panelFormulario.style.display = 'block';
            this.els.moduloActivo.value = modulo;

            let titulo = "", sub = "", html = "";

            if (modulo === 'apicultura') {
                titulo = "Ficha de Apicultura"; sub = "Módulo Apícola";
                html = `
                    <div class="grid-2 gap-lg">
                      <div><label>Tipo de Proyecto</label><select name="tipo_proyecto" required><option value="">Seleccione...</option><option value="Individual">Individual</option><option value="Comunitario">Comunitario</option></select></div>
                      <div><label>Insumos Entregados</label><input type="text" name="insumos" placeholder="Ej: Cajas, trajes, ahumadores" required></div>
                    </div>`;
            } else if (modulo === 'agricola') {
                titulo = "Ficha Producción Agrícola"; sub = "Módulo Agrícola";
                let opts = this.catalogos ? this.catalogos.rubros.map(r => `<option value="${r}">`).join('') : '';
                html = `
                    <div class="grid-2 gap-lg">
                      <div><label>Estado del Proyecto</label><select name="estado_proyecto" required><option value="Nueva">Nueva</option><option value="Implementada">Implementada</option></select></div>
                      <div>
                        <label>Rubro / Variedad</label>
                        <input type="text" name="rubro" list="list_rubros" placeholder="Ej: Sandía, Tomate, Huerta" required>
                        <datalist id="list_rubros">${opts}</datalist>
                      </div>
                    </div>`;
            } else if (modulo === 'forestal') {
                titulo = "Ficha Componente Forestal"; sub = "Módulo Forestal";
                let opts = this.catalogos ? this.catalogos.especies.map(r => `<option value="${r}">`).join('') : '';
                html = `
                    <div class="grid-2 gap-lg">
                      <div>
                        <label>Especie Forestal</label>
                        <input type="text" name="especie" list="list_esp" required>
                        <datalist id="list_esp">${opts}</datalist>
                      </div>
                      <div><label>Cantidad (Uds o Ha)</label><input type="text" name="cantidad" required></div>
                    </div>`;
            } else if (modulo === 'indigena') {
                titulo = "Ficha Componente Indígena"; sub = "Módulo Indígena";
                let opts = this.catalogos ? this.catalogos.etnias.map(r => `<option value="${r}">`).join('') : '';
                html = `
                    <div class="grid-2 gap-lg">
                      <div>
                        <label>Etnia / Pueblo</label>
                        <input type="text" name="etnia" list="list_etn" required>
                        <datalist id="list_etn">${opts}</datalist>
                       </div>
                      <div><label>Tipo de Asistencia/Insumo</label><input type="text" name="asistencia" required></div>
                    </div>`;
            }

            this.els.formTitle.textContent = titulo;
            this.els.lblSub.textContent = sub;
            this.els.camposEspec.innerHTML = html;
        },

        // --- LÓGICA INTELEGENTE DE AUTORRELLENADO V2 ---
        buscarCI: function () {
            const ciDesc = this.els.doc.value.trim();
            if (!ciDesc || ciDesc.length < 4) {
                this.els.statusCI.innerHTML = `<span style="color:var(--error); font-size:0.85em;">Ingrese cédula válida.</span>`;
                return;
            }

            this.els.btnBuscarCI.disabled = true;
            this.els.btnBuscarCI.textContent = "⏳...";
            this.els.statusCI.innerHTML = `<span class="muted" style="font-size:0.85em;">Consultando bases...</span>`;

            if (typeof google === 'undefined') {
                this.els.btnBuscarCI.disabled = false;
                this.els.btnBuscarCI.textContent = "🔍 Buscar";
                return; // Dummy test
            }

            google.script.run
                .withSuccessHandler(res => {
                    this.els.btnBuscarCI.disabled = false;
                    this.els.btnBuscarCI.textContent = "🔍 Buscar";

                    if (res.success) {
                        this.els.nom.value = res.data.nombres;
                        this.els.Ape.value = res.data.apellidos;
                        this.els.dep.value = res.data.departamento;
                        this.els.dis.value = res.data.distrito;
                        this.els.com.value = res.data.comunidad;

                        let badge = res.source === 'CRM' ? `<span class="status-pill success" style="font-size:0.7em;">En CRM Maestro</span>` : `<span class="status-pill soft" style="font-size:0.7em; background:#2196f3; color:white;">En Histórico_LEGACY</span>`;
                        this.els.statusCI.innerHTML = badge + ` <span style="font-size:0.85em; color:var(--pc-green)">¡Planilla Pre-llenada!</span>`;
                    } else {
                        // Limpiar para obligar nueva alta
                        this.els.nom.value = ""; this.els.Ape.value = ""; this.els.dep.value = ""; this.els.dis.value = ""; this.els.com.value = "";
                        this.els.statusCI.innerHTML = `<span class="status-pill soft" style="font-size:0.7em; background:#ff9800; color:white;">PRODUCTOR NUEVO</span> <span class="muted" style="font-size:0.8em;">Ingrese datos manualmente.</span>`;
                    }
                })
                .withFailureHandler(err => {
                    this.els.btnBuscarCI.disabled = false;
                    this.els.btnBuscarCI.textContent = "🔍 Buscar";
                    this.els.statusCI.innerHTML = `<span style="color:red; font-size:0.85em;">Servidor desconectado.</span>`;
                })
                .buscarProductorPWA(ciDesc);
        },

        // --- GUARDADO TRANSACCIONAL EN RED V2 ---
        guardarRegistro: function () {
            if (!this.els.registroForm.checkValidity()) {
                this.els.registroForm.reportValidity();
                return;
            }

            this.els.btnGuardar.disabled = true;
            this.els.btnGuardar.textContent = "Transfiriendo al servidor core...";

            const formData = new FormData(this.els.registroForm);
            const registro = {};
            formData.forEach((value, key) => { registro[key] = value });
            registro.registrado_por = this.usuarioActual ? this.usuarioActual.nombre : 'Web App';
            registro.comentario = document.getElementById('comentario').value.trim();

            if (typeof google !== 'undefined' && google.script) {
                google.script.run
                    .withSuccessHandler(res => {
                        this.els.btnGuardar.disabled = false;
                        this.els.btnGuardar.textContent = "✅ Guardar en Base Central";
                        if (res.success) {
                            this.els.formMsg.innerHTML = `<div class="msg-success"><b>Transacción Aprobada.</b><br>Actualización <i>_PERSONAS</i> y registro en <i>_INTERVENCIONES</i>.</div>`;
                            this.els.registroForm.reset();
                            setTimeout(() => this.volverAlDashboard(), 2500);
                        } else {
                            this.els.formMsg.innerHTML = `<div class="msg-error">Hubo un error al guardar: ${res.error}</div>`;
                        }
                    })
                    .withFailureHandler(err => {
                        this.els.btnGuardar.disabled = false;
                        this.els.btnGuardar.textContent = "✅ Guardar en Base Central";
                        this.els.formMsg.innerHTML = `<div class="msg-error">La conexión falló antes de terminar.</div>`;
                    })
                    .procesarRegistroWeb(registro);
            } else {
                this.els.btnGuardar.disabled = false;
                this.els.btnGuardar.textContent = "✅ Guardar (Dev Mode)";
            }
        },

        // --- CARGA DE TABLERO KPI ---
        cargarDashboard: function () {
            document.getElementById('kpiPersonas').innerText = "...";
            document.getElementById('kpiInterv').innerText = "...";
            document.getElementById('kpiDptos').innerText = "...";

            if (typeof google !== 'undefined' && google.script) {
                google.script.run
                    .withSuccessHandler(res => {
                        document.getElementById('kpiPersonas').innerText = res.totalProductores;
                        document.getElementById('kpiInterv').innerText = res.intervencionesRecientes;
                        document.getElementById('kpiDptos').innerText = Object.keys(res.dptosAcumulados).length;

                        this.dibujarGraficos(res);
                    })
                    .withFailureHandler(err => {
                        console.error('Error cargando tablero', err);
                    })
                    .getDashboardMetrics();
            }
        },

        dibujarGraficos: function (res) {
            Chart.defaults.font.family = 'Inter, sans-serif';

            // 1. Chart Modulos
            const modCtx = document.getElementById('chartModulos');
            if (this.chartInstances.mod) this.chartInstances.mod.destroy();
            this.chartInstances.mod = new Chart(modCtx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(res.modulosAcumulados),
                    datasets: [{
                        data: Object.values(res.modulosAcumulados),
                        backgroundColor: ['#0c5b45', '#0fa37f', '#f26d21', '#ff9800'],
                        borderWidth: 0
                    }]
                },
                options: { maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
            });

            // 2. Chart Dptos
            const dptCtx = document.getElementById('chartDptos');
            if (this.chartInstances.dpt) this.chartInstances.dpt.destroy();
            this.chartInstances.dpt = new Chart(dptCtx, {
                type: 'bar',
                data: {
                    labels: Object.keys(res.dptosAcumulados),
                    datasets: [{
                        label: 'Productores',
                        data: Object.values(res.dptosAcumulados),
                        backgroundColor: '#0c5b45',
                        borderRadius: 4
                    }]
                },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });

            // 3. Chart Timeline
            const timeCtx = document.getElementById('chartTimeline');
            if (this.chartInstances.time) this.chartInstances.time.destroy();

            // Ordenamos meses
            const meses = Object.keys(res.timeline).sort();
            const valores = meses.map(m => res.timeline[m]);

            this.chartInstances.time = new Chart(timeCtx, {
                type: 'line',
                data: {
                    labels: meses,
                    datasets: [{
                        label: 'Intervenciones Mensuales',
                        data: valores,
                        borderColor: '#f26d21',
                        backgroundColor: 'rgba(242, 109, 33, 0.1)',
                        fill: true,
                        tension: 0.3,
                        borderWidth: 3
                    }]
                },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
            });
        },

        // --- ADMINISTRADOR PELIGROSO ---
        reconstruirIndexHistorico: function () {
            const btn = document.getElementById('btnRebuild');
            if (confirm("ATENCIÓN:\n\nEsto leerá todas las hojas de Excel antiguas del archivo para aprenderse de memoria sus Cédulas, Nombres y Localidades.\n\n¿Estás seguro de correr esta tarea intensiva ahora mismo?")) {
                btn.disabled = true;
                btn.textContent = "Analizando miles de registros (No cierre)...";
                document.getElementById('adminMsg').innerText = "Procesando en servidores de Google. Podría demorar hasta un minuto.";

                if (typeof google !== 'undefined' && google.script) {
                    google.script.run
                        .withSuccessHandler(res => {
                            btn.disabled = false;
                            btn.textContent = "Reconstruir Índice Histórico (_LEGADO_INDEX)";
                            if (res.success) {
                                document.getElementById('adminMsg').innerHTML = `<span style="color:#2e7d32"><b>Éxito Operativo:</b> Se escanearon e indexaron <b>${res.regs}</b> productores legados para el algoritmo de autocompletado en esta PWA.</span>`;
                            } else {
                                document.getElementById('adminMsg').innerText = "Fallo: " + res.error;
                            }
                        })
                        .withFailureHandler(err => {
                            btn.disabled = false;
                            btn.textContent = "Reconstruir Índice Histórico (_LEGADO_INDEX)";
                            document.getElementById('adminMsg').innerText = "Error: Timeout de red al procesar las matrices.";
                        })
                        .reconstruirIndiceHistorico();
                }
            }
        }
    };

    document.addEventListener('DOMContentLoaded', () => app.init());
</script>
